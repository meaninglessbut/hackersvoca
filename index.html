    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="bg-slate-50 min-h-screen text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react,env">
        const { useState, useEffect, useRef } = React;

        // --- Icons (Inline SVGs) ---
        const Book = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;

        const Folder = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>;
        const Settings = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const Trash2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const Sparkles = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const Loader2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const CheckCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const XCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
        const RotateCcw = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const AlertCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const Key = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>;
        const Download = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const Upload = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;

        // --- Safe Storage Utils ---
        const safeGetItem = (key) => {
            try { return localStorage.getItem(key); } 
            catch (e) { return null; }
        };
        const safeSetItem = (key, value) => {
            try { localStorage.setItem(key, value); } 
            catch (e) { console.warn("Local storage is disabled."); }
        };

        // --- API & Utility Functions ---
        async function fetchWithRetry(url, options, maxRetries = 3) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    const responseData = await response.json();
                    
                    if (!response.ok) {
                        console.error("API Response Error:", responseData);
                        let errorMessage = `HTTP error! status: ${response.status}`;
                        if (responseData.error && responseData.error.message) {
                            errorMessage += ` - ${responseData.error.message}`;
                        }
                        throw new Error(errorMessage);
                    }
                    return responseData;
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        async function getBestModel(apiKey) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if (!response.ok) return 'gemini-1.5-flash'; 
                
                const data = await response.json();
                const models = data.models || [];
                
                const preferred = ['gemini-2.5-flash', 'gemini-2.0-flash', 'gemini-1.5-flash', 'gemini-pro'];
                for (const pref of preferred) {
                    const found = models.find(m => m.name.includes(pref) && (m.supportedGenerationMethods || []).includes('generateContent'));
                    if (found) return found.name.replace('models/', '');
                }
                
                const fallback = models.find(m => (m.supportedGenerationMethods || []).includes('generateContent'));
                return fallback ? fallback.name.replace('models/', '') : 'gemini-1.5-flash';
            } catch (error) {
                console.warn("Model list fetch failed. Using fallback.", error);
                return 'gemini-1.5-flash';
            }
        }

        async function generateVocabDetails(wordList, apiKey) {
            if (!wordList || wordList.length === 0) return [];
            
            const modelName = await getBestModel(apiKey);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            
            const prompt = `
                I am learning English vocabulary. I need an English-English dictionary style output for the following words: ${wordList.join(", ")}.
                For each word, provide:
                1. A clear English definition.
                2. A natural English example sentence.
                Return a JSON array of objects with keys: "word", "definition", "example".
            `;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "ARRAY",
                        items: {
                            type: "OBJECT",
                            properties: {
                                word: { type: "STRING" },
                                definition: { type: "STRING" },
                                example: { type: "STRING" }
                            },
                            required: ["word", "definition", "example"]
                        }
                    }
                }
            };

            const data = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            try {
                const jsonString = data.candidates[0].content.parts[0].text;
                return JSON.parse(jsonString);
            } catch (error) {
                console.error("Parse Error Details:", error);
                throw new Error("Invalid response format from AI.");
            }
        }

        async function generateQuizFromWords(selectedWords, allWords, apiKey, questionCount) {
            if (selectedWords.length === 0) return null;

            const modelName = await getBestModel(apiKey);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            
            const shuffledWords = [...selectedWords].sort(() => 0.5 - Math.random());
            const targetWords = shuffledWords.slice(0, questionCount);
            
            const targetWordListStr = targetWords.map(w => w.word).join(", ");
            const allWordListStr = allWords.map(w => w.word).join(", ");
            const distractorCount = Math.min(3, allWords.length - 1);

            const prompt = `
                I am an English vocabulary learner. I am taking a quiz on these target words: [${targetWordListStr}].
                My ENTIRE vocabulary pool is: [${allWordListStr}].
                
                Please generate a fill-in-the-blank vocabulary quiz with exactly ${targetWords.length} questions using the target words.
                For each question:
                1. Create a natural English example sentence.
                2. Replace the target word with '_____' in the sentence.
                3. Provide the correct target word.
                4. Provide exactly ${distractorCount} distractors (incorrect options).
                
                CRITICAL INSTRUCTIONS FOR DISTRACTORS: 
                - You MUST choose the distractors ONLY from my ENTIRE vocabulary pool provided above.
                - The distractors MUST NOT be synonyms of the correct answer and MUST NOT fit contextually in the blank. 
                - Ensure there is only ONE uniquely correct answer from the options provided.
            `;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ text: "You are an expert English teacher creating strict vocabulary quizzes. You never provide duplicate answers or use outside words." }]
                },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            questions: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        question: { type: "STRING" },
                                        correctAnswer: { type: "STRING" },
                                        distractors: {
                                            type: "ARRAY",
                                            items: { type: "STRING" }
                                        }
                                    },
                                    required: ["question", "correctAnswer", "distractors"]
                                }
                            }
                        },
                        required: ["questions"]
                    }
                }
            };

            const data = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            try {
                const jsonString = data.candidates[0].content.parts[0].text;
                const parsedData = JSON.parse(jsonString);
                
                const allWordsLowerCase = allWords.map(w => w.word.toLowerCase());

                const questionsWithOptions = parsedData.questions.map(q => {
                    let validDistractors = (q.distractors || []).filter(d => 
                        allWordsLowerCase.includes(d.toLowerCase()) && 
                        d.toLowerCase() !== q.correctAnswer.toLowerCase()
                    );

                    if (validDistractors.length < distractorCount) {
                        const usedLowerCase = [q.correctAnswer.toLowerCase(), ...validDistractors.map(v => v.toLowerCase())];
                        const remainingPool = allWordsLowerCase.filter(w => !usedLowerCase.includes(w));
                        
                        for (let i = remainingPool.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [remainingPool[i], remainingPool[j]] = [remainingPool[j], remainingPool[i]];
                        }
                        
                        const needed = distractorCount - validDistractors.length;
                        validDistractors.push(...remainingPool.slice(0, needed));
                    }

                    validDistractors = validDistractors.slice(0, distractorCount);

                    const options = [q.correctAnswer, ...validDistractors];
                    for (let i = options.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [options[i], options[j]] = [options[j], options[i]];
                    }
                    return { ...q, options };
                });

                return questionsWithOptions;
            } catch (error) {
                console.error("Parse Error Details:", error);
                throw new Error("Invalid response format from AI.");
            }
        }

        // --- Main App Component ---
        function App() {
            const [apiKey, setApiKey] = useState(() => safeGetItem('gemini_api_key') || '');
            const [activeTab, setActiveTab] = useState('words');
            
            const [words, setWords] = useState(() => {
                const saved = safeGetItem('vocab_words');
                if (saved) {
                    try { 
                        const parsed = JSON.parse(saved);
                        return parsed.map(w => ({
                            id: w.id || Date.now() + Math.random(),
                            word: w.word,
                            definition: w.definition || w.meaning || '',
                            example: w.example || '',
                            category: w.category || '기본 단어장'
                        }));
                    } catch(e) {}
                }
                return [
                    { id: 1, word: 'malleable', definition: 'Easily influenced, trained, or shaped without breaking.', example: 'Gold is a highly malleable metal used for delicate jewelry.', category: 'Unit 1' },
                    { id: 2, word: 'stipulate', definition: 'To demand or specify a requirement as part of an agreement.', example: 'The rental contract stipulates that no pets are allowed.', category: 'Unit 1' },
                    { id: 3, word: 'substantiate', definition: 'To provide evidence to support or prove the truth of something.', example: 'They could not substantiate the claims made in the article.', category: 'Unit 1' }
                ];
            });
            
            const [inputCategory, setInputCategory] = useState('Unit 1');
            const [inputText, setInputText] = useState('');
            const [isGeneratingVocab, setIsGeneratingVocab] = useState(false);
            
            const availableCategories = [...new Set(words.map(w => w.category))];
            const [quizCategorySelection, setQuizCategorySelection] = useState([]);
            const [quizQuestionCount, setQuizQuestionCount] = useState(10);
            
            const [isGenerating, setIsGenerating] = useState(false);
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);
            const [error, setError] = useState(null);
            
            const fileInputRef = useRef(null);

            useEffect(() => {
                setQuizCategorySelection(prev => {
                    const valid = prev.filter(c => availableCategories.includes(c));
                    if (valid.length === 0 && availableCategories.length > 0) return availableCategories;
                    return valid.length > 0 ? valid : availableCategories;
                });
            }, [words.length]);

            useEffect(() => {
                safeSetItem('vocab_words', JSON.stringify(words));
            }, [words]);

            useEffect(() => {
                safeSetItem('gemini_api_key', apiKey);
            }, [apiKey]);

            const handleGenerateVocab = async (e) => {
                e.preventDefault();
                if (!apiKey.trim()) {
                    setError("설정에서 Gemini API 키를 입력해주세요. (aistudio.google.com 에서 무료 발급)");
                    return;
                }
                const wordArr = inputText.split(',').map(w => w.trim()).filter(w => w.length > 0);
                if (wordArr.length === 0) return;

                setError(null);
                setIsGeneratingVocab(true);

                try {
                    const newVocabs = await generateVocabDetails(wordArr, apiKey.trim());
                    const newEntries = newVocabs.map(v => ({
                        id: Date.now() + Math.random(),
                        word: v.word.toLowerCase(),
                        definition: v.definition,
                        example: v.example,
                        category: inputCategory.trim() || '기본 단어장'
                    }));
                    setWords(prev => [...newEntries, ...prev]);
                    setInputText('');
                } catch (err) {
                    console.error("Vocab Generation Failed:", err);
                    setError(`단어장 생성에 실패했습니다: ${err.message || "알 수 없는 오류"}`);
                } finally {
                    setIsGeneratingVocab(false);
                }
            };

            const handleDeleteWord = (id) => {
                if(confirm("이 단어를 정말 삭제하시겠습니까?")) {
                    setWords(words.filter(w => w.id !== id));
                }
            };

            // --- 데이터 백업 및 복원 ---
            const handleExportData = () => {
                if (words.length === 0) {
                    alert("내보낼 단어가 없습니다.");
                    return;
                }
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(words));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "my_vocab_backup.json");
                document.body.appendChild(downloadAnchorNode); // required for firefox
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const handleImportData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (Array.isArray(importedData)) {
                            // 간단한 유효성 검사
                            const isValid = importedData.every(item => item.word && typeof item.word === 'string');
                            if (isValid) {
                                setWords(importedData);
                                alert("성공적으로 단어장을 복원했습니다!");
                            } else {
                                alert("파일 형식이 올바르지 않습니다. 단어 데이터가 아닙니다.");
                            }
                        } else {
                            alert("잘못된 파일 형식입니다.");
                        }
                    } catch (err) {
                        alert("파일을 읽는 중 오류가 발생했습니다. 올바른 JSON 파일인지 확인하세요.");
                        console.error(err);
                    }
                    // Reset input
                    if (fileInputRef.current) fileInputRef.current.value = "";
                };
                reader.readAsText(file);
            };


            const toggleQuizCategory = (cat) => {
                setQuizCategorySelection(prev => 
                    prev.includes(cat) ? prev.filter(c => c !== cat) : [...prev, cat]
                );
            };

            const startQuiz = async () => {
                const filteredWords = words.filter(w => quizCategorySelection.includes(w.category));
                
                if (filteredWords.length < 3) {
                    setError("선택한 카테고리에 최소 3개의 단어가 필요합니다.");
                    return;
                }
                if (!apiKey.trim()) {
                    setError("설정에서 Gemini API 키를 입력해주세요.");
                    return;
                }
                
                const actualCount = Math.min(Math.max(3, quizQuestionCount), filteredWords.length);

                setError(null);
                setIsGenerating(true);
                setActiveTab('quiz');
                
                try {
                    const questions = await generateQuizFromWords(filteredWords, words, apiKey.trim(), actualCount);
                    if (questions && questions.length > 0) {
                        setQuizQuestions(questions);
                        setCurrentQuestionIndex(0);
                        setUserAnswers([]);
                    } else {
                        throw new Error("No questions generated.");
                    }
                } catch (err) {
                    console.error("Quiz Generation Failed:", err);
                    setError(`AI 퀴즈 생성에 실패했습니다: ${err.message || "알 수 없는 오류"}`);
                    setActiveTab('words');
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleAnswerSelect = (answer) => {
                const isCorrect = answer === quizQuestions[currentQuestionIndex].correctAnswer;
                const newUserAnswers = [...userAnswers, { 
                    question: quizQuestions[currentQuestionIndex], 
                    selectedAnswer: answer, 
                    isCorrect 
                }];
                
                setUserAnswers(newUserAnswers);

                if (currentQuestionIndex < quizQuestions.length - 1) {
                    setTimeout(() => {
                        setCurrentQuestionIndex(currentQuestionIndex + 1);
                    }, 600);
                } else {
                    setTimeout(() => {
                        setActiveTab('results');
                    }, 600);
                }
            };

            const resetQuiz = () => {
                setQuizQuestions([]);
                setCurrentQuestionIndex(0);
                setUserAnswers([]);
                setActiveTab('words');
            };

            const wordsByCategory = words.reduce((acc, w) => {
                if (!acc[w.category]) acc[w.category] = [];
                acc[w.category].push(w);
                return acc;
            }, {});

            const renderWordList = () => (
                <div className="space-y-6 transition-opacity duration-500">
                    <div className="bg-gradient-to-r from-slate-800 to-slate-900 p-6 rounded-2xl shadow-sm text-white">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                            <div>
                                <h2 className="text-lg font-bold flex items-center gap-2 mb-1">
                                    <Key className="w-5 h-5 text-amber-400" />
                                    환경 설정 (Gemini API Key)
                                </h2>
                                <p className="text-slate-300 text-sm">로컬에서 AI를 사용하려면 구글의 무료 API 키가 필요합니다.</p>
                            </div>
                            <input
                                type="text"
                                autoComplete="off"
                                spellCheck={false}
                                placeholder="AIzaSy..."
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                                className="w-full sm:w-64 px-4 py-2.5 rounded-xl bg-slate-700/50 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 transition-all"
                            />
                        </div>
                    </div>

                    {error && (
                        <div className="bg-red-50 text-red-600 p-4 rounded-xl flex items-center gap-3 border border-red-100">
                            <AlertCircle className="w-5 h-5 flex-shrink-0" />
                            <p>{error}</p>
                        </div>
                    )}

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <BookOpen className="w-5 h-5 text-indigo-500" />
                            AI 단어장 자동 생성
                        </h2>
                        <form onSubmit={handleGenerateVocab} className="flex flex-col gap-3">
                            <div className="flex flex-col sm:flex-row gap-3">
                                <div className="w-full sm:w-1/4 relative">
                                    <div className="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                                        <Folder className="w-4 h-4 text-slate-400" />
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="카테고리 (예: Unit 1)"
                                        value={inputCategory}
                                        onChange={(e) => setInputCategory(e.target.value)}
                                        className="w-full pl-9 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                                        required
                                    />
                                </div>
                                <input
                                    type="text"
                                    autoComplete="off"
                                    placeholder="쉼표로 단어 나열 (예: virtually, intrigue, implausible)"
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    className="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                                    required
                                />
                                <button type="submit" disabled={isGeneratingVocab} className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white px-6 py-3 rounded-xl font-medium transition-colors flex items-center justify-center gap-2 whitespace-nowrap">
                                    {isGeneratingVocab ? <Loader2 className="w-5 h-5 animate-spin" /> : <Sparkles className="w-5 h-5" />}
                                    영영 정의 찾기
                                </button>
                            </div>
                        </form>
                    </div>

                    {/* 퀴즈 설정 영역 */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-indigo-100 bg-gradient-to-b from-indigo-50/50 to-white">
                        <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <Settings className="w-5 h-5 text-indigo-500" />
                            AI 퀴즈 설정 및 시작
                        </h2>
                        <div className="flex flex-col md:flex-row gap-6">
                            <div className="flex-1">
                                <label className="block text-sm font-bold text-slate-700 mb-2">출제할 카테고리 선택</label>
                                <div className="flex flex-wrap gap-2">
                                    {availableCategories.length === 0 && <span className="text-sm text-slate-400">등록된 카테고리가 없습니다.</span>}
                                    {availableCategories.map(cat => (
                                        <label key={cat} className={`flex items-center gap-2 px-3 py-2 rounded-lg border cursor-pointer transition-all ${quizCategorySelection.includes(cat) ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                                            <input type="checkbox" checked={quizCategorySelection.includes(cat)} onChange={() => toggleQuizCategory(cat)} className="rounded text-indigo-600 focus:ring-indigo-500" />
                                            <span className="text-sm font-medium">{cat}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div className="md:w-64 border-t md:border-t-0 md:border-l border-slate-200 pt-4 md:pt-0 md:pl-6 flex flex-col justify-between">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-2">출제할 문제 수</label>
                                    <div className="flex items-center gap-2">
                                        <input 
                                            type="number" 
                                            min="3" 
                                            max={words.filter(w => quizCategorySelection.includes(w.category)).length || 3} 
                                            value={quizQuestionCount} 
                                            onChange={e => setQuizQuestionCount(Number(e.target.value))} 
                                            className="w-20 px-3 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-center font-bold text-slate-700"
                                        />
                                        <span className="text-sm text-slate-500">/ 최대 {words.filter(w => quizCategorySelection.includes(w.category)).length} 문제</span>
                                    </div>
                                </div>
                                <button
                                    onClick={startQuiz}
                                    disabled={words.filter(w => quizCategorySelection.includes(w.category)).length < 3 || isGenerating}
                                    className={`w-full mt-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${
                                    words.filter(w => quizCategorySelection.includes(w.category)).length >= 3 
                                        ? 'bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white shadow-md hover:shadow-lg transform hover:-translate-y-0.5' 
                                        : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                    }`}
                                >
                                    {isGenerating ? <Loader2 className="w-5 h-5 animate-spin" /> : <Sparkles className="w-5 h-5" />}
                                    퀴즈 만들기
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 카테고리별 단어장 목록 및 백업/복원 */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div className="p-6 border-b border-slate-100 bg-slate-50/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <h2 className="text-lg font-bold text-slate-800">전체 단어장 ({words.length}개)</h2>
                            <div className="flex gap-2 w-full sm:w-auto">
                                <button onClick={handleExportData} className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold transition-colors">
                                    <Download className="w-4 h-4" /> 내보내기
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold transition-colors">
                                    <Upload className="w-4 h-4" /> 불러오기
                                </button>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={handleImportData} className="hidden" />
                            </div>
                        </div>
                        <div className="max-h-[600px] overflow-y-auto p-4 space-y-6">
                            {words.length === 0 ? (
                                <div className="p-8 text-center text-slate-500">
                                    위에서 단어들을 입력하여 영영 단어장을 만들어보세요!
                                </div>
                            ) : (
                                Object.keys(wordsByCategory).sort().map(category => (
                                    <div key={category} className="space-y-3">
                                        <h3 className="font-bold text-slate-700 flex items-center gap-2 border-b border-slate-200 pb-2">
                                            <Folder className="w-4 h-4 text-indigo-500" />
                                            {category} <span className="text-sm font-normal text-slate-400">({wordsByCategory[category].length}개)</span>
                                        </h3>
                                        <div className="grid gap-3">
                                            {wordsByCategory[category].map((w) => (
                                                <div key={w.id} className="p-4 rounded-xl border border-slate-100 flex items-start justify-between hover:border-indigo-100 hover:bg-indigo-50/30 transition-colors group">
                                                    <div className="flex-1 pr-4">
                                                        <p className="font-bold text-slate-800 text-lg mb-1">{w.word}</p>
                                                        <p className="text-indigo-600 font-medium text-sm mb-1">{w.definition}</p>
                                                        <p className="text-slate-500 italic text-sm">"{w.example}"</p>
                                                    </div>
                                                    <button
                                                        onClick={() => handleDeleteWord(w.id)}
                                                        className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors sm:opacity-0 group-hover:opacity-100 flex-shrink-0"
                                                        aria-label="단어 삭제"
                                                    >
                                                        <Trash2 className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );

            const renderQuiz = () => {
                if (isGenerating) {
                    return (
                        <div className="flex flex-col items-center justify-center py-20 text-center">
                            <div className="relative">
                                <div className="absolute inset-0 bg-indigo-200 rounded-full blur-xl animate-pulse"></div>
                                <Loader2 className="w-16 h-16 text-indigo-600 animate-spin relative z-10" />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mt-8 mb-2">AI가 퀴즈를 만들고 있어요</h2>
                            <p className="text-slate-500">카테고리 안에서 출제 단어를 고르고 예문을 생성하는 중입니다...</p>
                        </div>
                    );
                }

                if (!quizQuestions.length) return null;

                const currentQ = quizQuestions[currentQuestionIndex];
                const hasAnsweredCurrent = userAnswers.length > currentQuestionIndex;
                const currentAnswer = hasAnsweredCurrent ? userAnswers[currentQuestionIndex].selectedAnswer : null;

                return (
                    <div className="max-w-2xl mx-auto">
                        <div className="mb-8 flex items-center justify-between">
                            <div className="flex gap-1 flex-1 mr-4 overflow-hidden">
                                {quizQuestions.map((_, idx) => (
                                    <div key={idx} className={`h-2 flex-1 rounded-full transition-colors ${idx === currentQuestionIndex ? 'bg-indigo-600' : idx < currentQuestionIndex ? 'bg-indigo-200' : 'bg-slate-200'}`} />
                                ))}
                            </div>
                            <span className="text-sm font-bold text-slate-500 whitespace-nowrap">
                                {currentQuestionIndex + 1} / {quizQuestions.length}
                            </span>
                        </div>

                        <div className="bg-white p-6 sm:p-10 rounded-3xl shadow-sm border border-slate-100 mb-8">
                            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-indigo-50 text-indigo-700 text-sm font-bold mb-6">
                                <Sparkles className="w-4 h-4" />
                                AI 생성 예문
                            </div>
                            {/* 힌트 박스 완전 삭제 */}
                            <p className="text-xl sm:text-2xl leading-relaxed text-slate-800 font-medium mb-2 break-words">
                                {currentQ.question}
                            </p>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {currentQ.options.map((option, idx) => {
                                let buttonStateClass = "bg-white border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700";
                                let Icon = null;

                                if (hasAnsweredCurrent) {
                                    const isSelected = currentAnswer === option;
                                    const isCorrect = option === currentQ.correctAnswer;
                                    if (isCorrect) {
                                        buttonStateClass = "bg-green-50 border-green-500 text-green-700 shadow-sm";
                                        Icon = <CheckCircle className="w-5 h-5 text-green-600" />;
                                    } else if (isSelected && !isCorrect) {
                                        buttonStateClass = "bg-red-50 border-red-300 text-red-700";
                                        Icon = <XCircle className="w-5 h-5 text-red-500" />;
                                    } else {
                                        buttonStateClass = "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
                                    }
                                }

                                return (
                                    <button
                                        key={idx}
                                        disabled={hasAnsweredCurrent}
                                        onClick={() => handleAnswerSelect(option)}
                                        className={`p-5 rounded-2xl border-2 font-bold text-lg text-left transition-all flex items-center justify-between break-all ${buttonStateClass} ${!hasAnsweredCurrent && 'transform hover:-translate-y-1 hover:shadow-md'}`}
                                    >
                                        {option}
                                        {Icon && <span>{Icon}</span>}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderResults = () => {
                const correctCount = userAnswers.filter(a => a.isCorrect).length;
                const percentage = Math.round((correctCount / quizQuestions.length) * 100);

                return (
                    <div className="max-w-3xl mx-auto">
                        <div className="bg-white p-8 sm:p-10 rounded-3xl shadow-sm border border-slate-100 text-center mb-8">
                            <div className="inline-flex items-center justify-center w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-indigo-50 mb-6">
                                <span className="text-3xl sm:text-4xl font-black text-indigo-600">{percentage}%</span>
                            </div>
                            <h2 className="text-2xl sm:text-3xl font-bold text-slate-800 mb-4">
                                {percentage >= 80 ? '훌륭합니다! 🎉' : percentage >= 50 ? '잘 하셨어요! 👍' : '조금 더 연습해볼까요? 💪'}
                            </h2>
                            <p className="text-slate-500 text-lg">
                                총 {quizQuestions.length}문제 중 <strong className="text-indigo-600">{correctCount}문제</strong>를 맞혔습니다.
                            </p>
                            
                            <button onClick={resetQuiz} className="mt-8 bg-slate-800 hover:bg-slate-900 text-white px-8 py-4 rounded-xl font-bold text-lg transition-colors inline-flex items-center gap-2">
                                <RotateCcw className="w-5 h-5" />
                                단어장으로 돌아가기
                            </button>
                        </div>

                        <div className="space-y-4">
                            <h3 className="font-bold text-xl text-slate-800 mb-6 px-2">상세 결과 및 오답 노트</h3>
                            {userAnswers.map((answer, idx) => {
                                const wordObj = words.find(w => w.word.toLowerCase() === answer.question.correctAnswer.toLowerCase());
                                const originalDef = wordObj ? wordObj.definition : 'Definition not found.';

                                return (
                                    <div key={idx} className={`p-5 sm:p-6 rounded-2xl border ${answer.isCorrect ? 'bg-green-50/50 border-green-100' : 'bg-red-50/50 border-red-100'}`}>
                                        <div className="flex flex-col sm:flex-row items-start gap-4">
                                            <div className="mt-1 hidden sm:block">
                                                {answer.isCorrect ? <CheckCircle className="w-6 h-6 text-green-500" /> : <XCircle className="w-6 h-6 text-red-500" />}
                                            </div>
                                            <div className="flex-1 w-full">
                                                <p className="text-lg text-slate-800 font-medium mb-4 break-words">
                                                    {answer.question.question}
                                                </p>
                                                <div className="flex flex-col sm:flex-row flex-wrap gap-x-6 gap-y-2 text-sm bg-white/60 p-3 rounded-xl">
                                                    <p className="font-bold text-slate-600">정답: <span className="text-indigo-600 text-base">{answer.question.correctAnswer}</span></p>
                                                    <p className="font-bold text-slate-600">뜻: <span className="text-slate-800">{originalDef}</span></p>
                                                    {!answer.isCorrect && (
                                                        <p className="font-bold text-red-600">선택한 답: <span className="text-red-700">{answer.selectedAnswer}</span></p>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="pb-20">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-indigo-500 to-violet-600 p-2 rounded-xl shadow-sm">
                                    <Book className="w-6 h-6 text-white" />
                                </div>
                                <h1 className="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600 hidden sm:block">
                                    AI Vocab Master
                                </h1>
                            </div>
                            <div className="flex space-x-1 bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => { if(!isGenerating && activeTab !== 'quiz') setActiveTab('words'); }} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${activeTab === 'words' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>단어장</button>
                                <button disabled className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${(activeTab === 'quiz' || activeTab === 'results') ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 opacity-50'}`}>퀴즈 모드</button>
                            </div>
                        </div>
                    </header>
                    <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {activeTab === 'words' && renderWordList()}
                        {activeTab === 'quiz' && renderQuiz()}
                        {activeTab === 'results' && renderResults()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
